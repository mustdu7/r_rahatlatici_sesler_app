name: R
options:
  bundleIdPrefix: com.must
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:

  # ── Ana Uygulama ─────────────────────────────────────────────
  RelaxApp:
    type: application
    platform: iOS
    bundleId: com.must.rrahatlaticisesler
    deploymentTarget: "17.0"

    sources:
      - path: RelaxApp

    dependencies:
      - target: RelaxWidget
        embed: true
      - sdk: AVFoundation.framework
      - sdk: MediaPlayer.framework
      - sdk: UserNotifications.framework
      - sdk: WidgetKit.framework
      - sdk: AppIntents.framework

    info:
      path: RelaxApp/Info.plist
      properties:
        CFBundleDisplayName: "R: Rahatlatıcı Sesler"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        UIBackgroundModes:
          - audio
          - remote-notification
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - relax
            CFBundleURLName: com.must.rrahatlaticisesler
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSupportsIndirectInputEvents: true

    entitlements:
      path: RelaxApp/RelaxApp.entitlements

    settings:
      base:
        PRODUCT_NAME: RahatlaticiSesler
        PRODUCT_BUNDLE_IDENTIFIER: com.must.rrahatlaticisesler
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  # ── Widget Extension ─────────────────────────────────────────
  RelaxWidget:
    type: app-extension
    platform: iOS
    bundleId: com.must.rrahatlaticisesler.widget
    deploymentTarget: "17.0"

    sources:
      - path: RelaxWidget

    resources:
      - path: RelaxWidget/Assets.xcassets

    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

    info:
      path: RelaxWidget/Info.plist
      properties:
        CFBundleDisplayName: "R: Rahatlatıcı Sesler"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

    entitlements:
      path: RelaxWidget/RelaxWidget.entitlements

    settings:
      base:
        PRODUCT_NAME: RelaxWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.must.rrahatlaticisesler.widget
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SKIP_INSTALL: YES
